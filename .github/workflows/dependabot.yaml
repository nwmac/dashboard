name: Fetch Dependabot Alerts

on:
  workflow_dispatch: # Allows manual triggering for testing
  schedule:
    - cron: '0 8 * * 1' # Runs every Monday at 8 AM

# 1. Lock down permissions globally to read-only/none
permissions: {}

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    
    # 2. Grant the absolute minimum permission required for this specific job
    permissions:
      security-events: read
      contents: read # Required to checkout the repo if needed, or for basic context

    steps:
      - name: Fetch Open Dependabot Alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching open Dependabot alerts..."
          
          # 3. Use the built-in gh CLI to call the Dependabot REST API
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/dependabot/alerts \
            -f state=open \
            --jq '.[] | {number: .number, dependency: .dependency.package.name, severity: .security_advisory.severity, summary: .security_advisory.summary}'